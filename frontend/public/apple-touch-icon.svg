<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Navy background with rounded corners (iOS clips to circle, but Android shows square) -->
  <rect width="180" height="180" rx="36" fill="#00193c"/>

  <!-- Fork: 3 tines -->
  <rect x="43" y="24" width="7" height="42" rx="3.5" fill="white"/>
  <rect x="57" y="24" width="7" height="42" rx="3.5" fill="white"/>
  <rect x="71" y="24" width="7" height="42" rx="3.5" fill="white"/>
  <!-- Fork neck -->
  <path d="M46.5 66 Q61 80 74.5 66" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Fork handle -->
  <rect x="57" y="78" width="7" height="78" rx="3.5" fill="white"/>

  <!-- Red divider -->
  <rect x="86" y="24" width="7" height="132" rx="3.5" fill="#b7141c"/>

  <!-- Knife blade -->
  <path d="M104 24 L122 24 C122 24 130 40 128 78 L104 78 Z" fill="white"/>
  <!-- Knife handle -->
  <rect x="104" y="78" width="7" height="78" rx="3.5" fill="white"/>
</svg>
