<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background -->
  <rect width="32" height="32" rx="6" fill="#00193c"/>

  <!-- Fork: 3 tines -->
  <rect x="7.5" y="4" width="1.2" height="7" rx=".6" fill="white"/>
  <rect x="9.9" y="4" width="1.2" height="7" rx=".6" fill="white"/>
  <rect x="12.3" y="4" width="1.2" height="7" rx=".6" fill="white"/>
  <!-- Fork neck -->
  <path d="M8.1 11 Q10.5 13.5 12.9 11" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Fork handle -->
  <rect x="9.9" y="13" width="1.2" height="15" rx=".6" fill="white"/>

  <!-- Red accent line between fork and knife -->
  <rect x="15.4" y="4" width="1.2" height="24" rx=".6" fill="#b7141c"/>

  <!-- Knife blade (tapered) -->
  <path d="M19 4 L21.5 4 C21.5 4 22.5 7 22 14 L19 14 Z" fill="white"/>
  <!-- Knife handle -->
  <rect x="19" y="14" width="1.2" height="14" rx=".6" fill="white"/>
</svg>
